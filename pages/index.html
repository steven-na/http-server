<!DOCTYPE html>
<!-- Mostly AI Generated (Other than article content) -->
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function() {
      var t = localStorage.getItem('theme') ||
              (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <title>mysite.io</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:     #fafaf8;
      --fg:     #1a1a18;
      --muted:  #6b6b65;
      --border: #e0dfd8;
    }

    [data-theme="warm"] {
      --bg:     #fdf6e3;
      --fg:     #1a1a18;
      --muted:  #6b6b65;
      --border: #e8e0cc;
    }

    [data-theme="dark"] {
      --bg:     #1a1916;
      --fg:     #e8e6e0;
      --muted:  #9a9890;
      --border: #2e2d28;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg);
      color: var(--fg);
      font-family: 'Lora', Georgia, serif;
      font-size: 17px;
      line-height: 1.75;
      padding: 0 1rem;
      transition: background 0.2s, color 0.2s;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .header-inner {
      max-width: 90%;
      margin: 0 auto;
      padding: 1.25rem 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .site-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: var(--fg);
      text-decoration: none;
    }

    .header-right {
      display: flex;
      align-items: center;
    }

    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0 0 0 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.73rem;
      color: var(--muted);
      transition: color 0.15s;
    }

    .theme-toggle:hover { color: var(--fg); }

    .theme-toggle svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
      flex-shrink: 0;
    }

    .header-divider {
      width: 1px;
      height: 1.1rem;
      background: var(--border);
      margin: 0 0.6rem;
    }

    nav {
      display: flex;
      align-items: center;
      gap: 1.25rem;
    }

    nav a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.15s;
    }

    nav a:hover { color: var(--fg); }

    /* ── Centered hero ── */
    .home-hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding-bottom: 2rem;
    }

    .home-hero h1 {
      font-size: 2.6rem;
      font-weight: 600;
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .home-hero .subtitle {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .home-icons {
      display: flex;
      align-items: center;
      gap: 1.1rem;
      margin-top: 1.5rem;
    }

    .home-icon {
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.15s;
    }

    .home-icon:hover { color: var(--fg); }

    .home-icon svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }
  </style>
</head>
<body>

<div class="home-hero">

        <path d="M4.715 6.542 3.343 7.914a3 3 0 1 0 4.243 4.243l1.828-1.829A3 3 0 0 0 8.586 5.5L8 6.086a1.002 1.002 0 0 0-.154.199 2 2 0 0 1 .861 3.337L6.88 11.45a2 2 0 1 1-2.83-2.83l.793-.792a4.018 4.018 0 0 1-.128-1.287z"/>
        <path d="M6.586 4.672A3 3 0 0 0 7.414 9.5l.775-.776a2 2 0 0 1-.896-3.346L9.12 3.55a2 2 0 1 1 2.83 2.83l-.793.792c.112.42.155.855.128 1.287l1.372-1.372a3 3 0 1 0-4.243-4.243z"/>

</div>

<script>
  const themes   = ['light', 'warm', 'dark'];
  const sunIcon  = `<path d="M8 11a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm0 1a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM8 0a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 0zm0 13a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-1 0v-2A.5.5 0 0 1 8 13zm8-5a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2a.5.5 0 0 1 .5.5zM3 8a.5.5 0 0 1-.5.5h-2a.5.5 0 0 1 0-1h2A.5.5 0 0 1 3 8zm10.657-5.657a.5.5 0 0 1 0 .707l-1.414 1.415a.5.5 0 1 1-.707-.708l1.414-1.414a.5.5 0 0 1 .707 0zm-9.193 9.193a.5.5 0 0 1 0 .707L3.05 13.657a.5.5 0 0 1-.707-.707l1.414-1.414a.5.5 0 0 1 .707 0zm9.193 2.121a.5.5 0 0 1-.707 0l-1.414-1.414a.5.5 0 0 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .707zM4.464 4.465a.5.5 0 0 1-.707 0L2.343 3.05a.5.5 0 1 1 .707-.707l1.414 1.414a.5.5 0 0 1 0 .708z"/>`;
  const warmIcon = `<path d="M8 3.5a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9zM1 8a7 7 0 1 1 14 0A7 7 0 0 1 1 8z"/><path d="M8 6a2 2 0 1 0 0 4 2 2 0 0 0 0-4zm-3.5 2a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/>`;
  const moonIcon = `<path d="M6 .278a.768.768 0 0 1 .08.858 7.208 7.208 0 0 0-.878 3.46c0 4.021 3.278 7.277 7.318 7.277.527 0 1.04-.055 1.533-.16a.787.787 0 0 1 .81.316.733.733 0 0 1-.031.893A8.349 8.349 0 0 1 8.344 16C3.734 16 0 12.286 0 7.71 0 4.266 2.114 1.312 5.124.06A.752.752 0 0 1 6 .278z"/>`;
  const icons    = [sunIcon, warmIcon, moonIcon];

  const saved      = localStorage.getItem('theme');
  const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
  const initial    = saved || (systemDark ? 'dark' : 'light');
  let   current    = Math.max(themes.indexOf(initial), 0);

  function applyTheme(idx) {
    const t = themes[idx];
    document.documentElement.setAttribute('data-theme', t);
    document.getElementById('themeLabel').textContent = t;
    document.getElementById('themeIcon').innerHTML    = icons[idx];
    localStorage.setItem('theme', t);
  }

  applyTheme(current);

  document.getElementById('themeToggle').addEventListener('click', () => {
    current = (current + 1) % themes.length;
    applyTheme(current);
  });

  window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
    if (!localStorage.getItem('theme')) {
      current = themes.indexOf(e.matches ? 'dark' : 'light');
      applyTheme(current);
    }
  });
</script>
