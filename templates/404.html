<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fafaf8;
      color: #1a1a18;
      font-family: 'Lora', Georgia, serif;
      font-size: 17px;
      line-height: 1.75;
      padding: 0 1rem;
    }

    header, main, footer { max-width: 680px; margin: 0 auto; }

    header {
      padding: 2rem 0 1.5rem;
      border-bottom: 1px solid #e0dfd8;
      display: flex;
      align-items: baseline;
      gap: 2rem;
    }

    .site-name {
      font-family: 'JetBrains Mono', monospace;
      font-size: 1rem;
      font-weight: 500;
      color: #1a1a18;
      text-decoration: none;
    }

    nav a {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: #6b6b65;
      text-decoration: none;
    }

    nav a:hover { color: #1a1a18; }

    h1 {
      font-size: 1.9rem;
      font-weight: 600;
      line-height: 1.25;
      letter-spacing: -0.02em;
      margin-bottom: 2.5rem;
    }

    main { padding: 3.5rem 0 4rem; }

    p  { margin-bottom: 1.2rem; }
    h2 { font-size: 1.15rem; font-weight: 600; margin: 2.5rem 0 0.75rem; }

    code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82em;
      background: #f0efeb;
      padding: 0.1em 0.35em;
      border-radius: 3px;
    }

    pre {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      background: #f0efeb;
      border-left: 3px solid #2d6a4f;
      padding: 1rem 1.2rem;
      overflow-x: auto;
      margin: 1.4rem 0;
    }

    pre code { background: none; padding: 0; }

    footer {
      border-top: 1px solid #e0dfd8;
      padding: 1.5rem 0 2.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.73rem;
      color: #6b6b65;
    }
  </style>
</head>
<body>

<header>
  <a class="site-name" href="/">mysite.io</a>
  <nav>
    <a href="/posts">Posts</a>
  </nav>
</header>

<main>
  <article>
    <h1>404</h1>

    Page not found.

  </article>
</main>

<footer></footer>

</body>
</html>
